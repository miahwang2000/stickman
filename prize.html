<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작품 전시 갤러리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --wall: #f7f5f1;
    --wall-deep: #efece5;
    --ink: #201d1a;
    --ink-soft: #55504a;
    --line: #ddd7ca;
    --brass: #9c7c3f;
    --brass-deep: #7a6031;
    --gold: #b6902f;
    --gold-deep: #8a6a1f;
    --rose: #93443f;
    --rose-deep: #712f2b;
    --sage: #4d6b57;
    --sage-deep: #38503f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--wall);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
  }

  /* ---------- 업로드 화면 ---------- */
  #uploadScreen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
  }
  .brand{
    text-align:center;
    margin-bottom:36px;
  }
  .brand .eyebrow{
    font-size:12px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--brass-deep);
    font-weight:600;
    margin-bottom:10px;
  }
  .brand h1{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:clamp(30px, 4.5vw, 46px);
    margin:0;
    letter-spacing:0.01em;
  }
  .brand p{
    margin:12px 0 0;
    color:var(--ink-soft);
    font-size:15px;
  }

  .panel{
    background:#fff;
    border:1px solid var(--line);
    border-radius:4px;
    padding:36px;
    width:100%;
    max-width:560px;
    box-shadow:0 1px 2px rgba(32,29,26,0.04);
  }

  .dropzone{
    border:1.5px dashed var(--line);
    border-radius:3px;
    padding:44px 20px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .dropzone:hover, .dropzone.drag{
    border-color:var(--brass);
    background:#fbf9f4;
  }
  .dropzone svg{ margin-bottom:14px; opacity:0.55; }
  .dropzone .main{ font-size:15px; font-weight:500; }
  .dropzone .sub{ font-size:13px; color:var(--ink-soft); margin-top:6px; }
  #fileInput{ display:none; }

  #fileList{
    margin-top:20px;
    max-height:220px;
    overflow-y:auto;
    border-top:1px solid var(--line);
  }
  .file-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:9px 2px;
    border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .file-row .num{
    font-family:'Playfair Display', serif;
    font-weight:600;
    color:var(--brass-deep);
    width:26px;
    flex-shrink:0;
    text-align:right;
  }
  .file-row .name{
    flex:1;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    color:var(--ink-soft);
  }
  .file-row .badge{
    font-size:10px;
    letter-spacing:0.05em;
    padding:2px 6px;
    border-radius:2px;
    background:var(--wall-deep);
    color:var(--brass-deep);
    font-weight:600;
    flex-shrink:0;
  }

  .count-line{
    margin-top:16px;
    font-size:13px;
    color:var(--ink-soft);
    text-align:center;
  }

  #generateBtn{
    margin-top:22px;
    width:100%;
    padding:14px;
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:3px;
    font-family:'Work Sans', sans-serif;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.04em;
    cursor:pointer;
    transition:background .15s ease;
  }
  #generateBtn:disabled{
    background:#c9c3b8;
    cursor:not-allowed;
  }
  #generateBtn:not(:disabled):hover{
    background:var(--brass-deep);
  }

  /* ---------- 갤러리 화면 ---------- */
  #galleryScreen{ display:none; }

  .gallery-header{
    position:sticky;
    top:0;
    z-index:5;
    background:var(--wall);
    border-bottom:1px solid var(--line);
    padding:22px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .gallery-header h1{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:22px;
    margin:0;
  }
  .gallery-header .sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
  }
  #newGalleryBtn{
    background:transparent;
    border:1px solid var(--ink);
    color:var(--ink);
    padding:9px 16px;
    border-radius:3px;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }
  #newGalleryBtn:hover{ background:var(--ink); color:#fff; }

  .vote-banner{
    text-align:center;
    padding:22px 20px 6px;
  }
  .vote-banner .line1{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:19px;
    color:var(--ink);
  }
  .vote-banner .line2{
    font-size:12.5px;
    color:var(--ink-soft);
    margin-top:6px;
    letter-spacing:0.02em;
  }

  #grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, 250px);
    justify-content:center;
    gap:34px 26px;
    padding:30px 24px 70px;
  }

  .artwork{
    width:250px;
  }
  .frame{
    width:250px;
    height:250px;
    background:#fff;
    border:1px solid var(--line);
    padding:8px;
    box-shadow:0 1px 3px rgba(32,29,26,0.06);
    position:relative;
    overflow:hidden;
    cursor:pointer;
    transition:box-shadow .15s ease, border-color .15s ease;
  }
  .frame:hover{
    border-color:var(--brass);
    box-shadow:0 3px 10px rgba(32,29,26,0.12);
  }
  .frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    background:var(--wall-deep);
  }
  .plaque{
    margin-top:10px;
    text-align:center;
  }
  .plaque .num{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:15px;
    color:var(--ink);
  }
  .plaque .num::before{
    content:"No. ";
    font-size:11px;
    color:var(--brass-deep);
    letter-spacing:0.08em;
    font-family:'Work Sans', sans-serif;
    font-weight:600;
  }
  .plaque .award-label{
    display:block;
    margin-top:3px;
    font-size:10.5px;
    font-weight:600;
    letter-spacing:0.06em;
  }
  .plaque .award-label.tier-grand{ color:var(--gold-deep); }
  .plaque .award-label.tier-excellent{ color:var(--rose-deep); }
  .plaque .award-label.tier-merit{ color:var(--sage-deep); }

  /* 상장 리본 */
  .ribbon{
    position:absolute;
    top:16px;
    right:-42px;
    width:160px;
    transform:rotate(45deg);
    text-align:center;
    padding:6px 0;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.06em;
    color:#fff;
    box-shadow:0 1px 4px rgba(0,0,0,0.28);
    pointer-events:none;
    font-family:'Work Sans', sans-serif;
  }
  .ribbon.tier-grand{ background:linear-gradient(180deg, var(--gold), var(--gold-deep)); }
  .ribbon.tier-excellent{ background:linear-gradient(180deg, var(--rose), var(--rose-deep)); }
  .ribbon.tier-merit{ background:linear-gradient(180deg, var(--sage), var(--sage-deep)); }

  /* 상장 선택 메뉴 */
  .award-menu{
    position:fixed;
    z-index:50;
    background:#fff;
    border:1px solid var(--line);
    border-radius:6px;
    box-shadow:0 8px 24px rgba(32,29,26,0.18);
    padding:6px;
    min-width:170px;
    font-family:'Work Sans', sans-serif;
  }
  .award-menu .menu-label{
    font-size:10.5px;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    padding:6px 10px 4px;
    text-transform:uppercase;
    font-weight:600;
  }
  .award-menu button{
    display:flex;
    align-items:center;
    gap:9px;
    width:100%;
    text-align:left;
    border:none;
    background:transparent;
    padding:9px 10px;
    font-size:13.5px;
    color:var(--ink);
    border-radius:4px;
    cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }
  .award-menu button:hover{ background:var(--wall); }
  .award-menu button .dot{
    width:9px; height:9px; border-radius:50%; flex-shrink:0;
  }
  .award-menu button.tier-grand .dot{ background:var(--gold); }
  .award-menu button.tier-excellent .dot{ background:var(--rose); }
  .award-menu button.tier-merit .dot{ background:var(--sage); }
  .award-menu button.clear{ color:var(--ink-soft); }
  .award-menu button.clear .dot{ background:var(--line); border:1px solid #c9c3b8; }
  .award-menu hr{
    border:none;
    border-top:1px solid var(--line);
    margin:5px 4px;
  }

  footer.gallery-footer{
    text-align:center;
    padding:0 20px 40px;
    font-size:11.5px;
    color:#a29c8f;
    letter-spacing:0.03em;
  }
</style>
</head>
<body>

<!-- ============ 업로드 화면 ============ -->
<div id="uploadScreen">
  <div class="brand">
    <div class="eyebrow">Student Art Exhibition</div>
    <h1>작품 전시 갤러리 만들기</h1>
    <p>작품 파일을 올리고 버튼을 누르면 전시 갤러리가 바로 만들어집니다.</p>
  </div>

  <div class="panel">
    <div class="dropzone" id="dropzone">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#201d1a" stroke-width="1.4">
        <path d="M12 16V4M12 4l-4 4M12 4l4 4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="main">클릭하거나 파일을 끌어다 놓으세요</div>
      <div class="sub">JPG, PNG, GIF 등 이미지 파일 · 여러 개 선택 가능 · GIF는 갤러리에서 움직입니다</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>

    <div id="fileList"></div>
    <div class="count-line" id="countLine"></div>

    <button id="generateBtn" disabled>갤러리 생성</button>
  </div>
</div>

<!-- ============ 갤러리 화면 ============ -->
<div id="galleryScreen">
  <div class="gallery-header">
    <div>
      <h1>학생 작품 전시회</h1>
      <div class="sub" id="galleryCount"></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
      <button id="newGalleryBtn">새 갤러리 만들기</button>
      <span style="font-size:11px; color:var(--ink-soft);">작품을 클릭하면 우수작을 선정할 수 있어요</span>
    </div>
  </div>

  <div class="vote-banner">
    <div class="line1">가장 마음에 든 작품을 마음속으로 선택하세요</div>
    <div class="line2">작품 번호만 기억해 두시면 됩니다</div>
  </div>

  <div id="grid"></div>

  <footer class="gallery-footer">전시 번호는 업로드 순서에 따라 1번부터 부여되며 파일명과는 무관합니다</footer>
</div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileList = document.getElementById('fileList');
  const countLine = document.getElementById('countLine');
  const generateBtn = document.getElementById('generateBtn');
  const uploadScreen = document.getElementById('uploadScreen');
  const galleryScreen = document.getElementById('galleryScreen');
  const grid = document.getElementById('grid');
  const galleryCount = document.getElementById('galleryCount');
  const newGalleryBtn = document.getElementById('newGalleryBtn');

  let files = []; // 업로드 순서를 그대로 유지하는 배열

  dropzone.addEventListener('click', () => fileInput.click());

  ['dragenter','dragover'].forEach(evt=>{
    dropzone.addEventListener(evt, e=>{
      e.preventDefault();
      dropzone.classList.add('drag');
    });
  });
  ['dragleave','drop'].forEach(evt=>{
    dropzone.addEventListener(evt, e=>{
      e.preventDefault();
      dropzone.classList.remove('drag');
    });
  });
  dropzone.addEventListener('drop', e=>{
    const dropped = Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
    addFiles(dropped);
  });

  fileInput.addEventListener('change', e=>{
    addFiles(Array.from(e.target.files));
    fileInput.value = '';
  });

  function addFiles(newFiles){
    files = files.concat(newFiles);
    renderFileList();
  }

  function renderFileList(){
    fileList.innerHTML = '';
    files.forEach((f, i)=>{
      const row = document.createElement('div');
      row.className = 'file-row';
      const isGif = f.type === 'image/gif';
      row.innerHTML = `
        <span class="num">${i+1}</span>
        <span class="name">${escapeHtml(f.name)}</span>
        ${isGif ? '<span class="badge">GIF</span>' : ''}
      `;
      fileList.appendChild(row);
    });
    countLine.textContent = files.length > 0 ? `총 ${files.length}개의 작품이 등록되었습니다` : '';
    generateBtn.disabled = files.length === 0;
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  generateBtn.addEventListener('click', buildGallery);

  let awards = {}; // index -> tier key ('grand' | 'excellent' | 'merit')
  const TIERS = {
    grand:     { label: '대상',    cls: 'tier-grand' },
    excellent: { label: '최우수상', cls: 'tier-excellent' },
    merit:     { label: '우수상',  cls: 'tier-merit' }
  };

  function buildGallery(){
    grid.innerHTML = '';
    awards = {};
    files.forEach((file, index)=>{
      const url = URL.createObjectURL(file);
      const item = document.createElement('div');
      item.className = 'artwork';
      item.dataset.index = index;
      item.innerHTML = `
        <div class="frame">
          <img src="${url}" alt="작품 ${index+1}">
        </div>
        <div class="plaque">
          <span class="num">${index+1}</span>
          <span class="award-label"></span>
        </div>
      `;
      item.querySelector('.frame').addEventListener('click', (e)=> openAwardMenu(e, index));
      grid.appendChild(item);
    });
    galleryCount.textContent = `총 ${files.length}점 전시 중`;
    updateAwardSummary();
    uploadScreen.style.display = 'none';
    galleryScreen.style.display = 'block';
    window.scrollTo(0,0);
  }

  function updateAwardSummary(){
    const n = Object.keys(awards).length;
    galleryCount.textContent = `총 ${files.length}점 전시 중` + (n > 0 ? ` · 우수작 ${n}점 선정됨` : '');
  }

  function renderArtworkAward(index){
    const item = grid.querySelector(`.artwork[data-index="${index}"]`);
    if(!item) return;
    const frame = item.querySelector('.frame');
    const existingRibbon = frame.querySelector('.ribbon');
    if(existingRibbon) existingRibbon.remove();
    const labelEl = item.querySelector('.award-label');

    const tierKey = awards[index];
    if(tierKey){
      const tier = TIERS[tierKey];
      const ribbon = document.createElement('div');
      ribbon.className = `ribbon ${tier.cls}`;
      ribbon.textContent = tier.label;
      frame.appendChild(ribbon);
      labelEl.textContent = `${tier.label} 수상작`;
      labelEl.className = `award-label ${tier.cls}`;
    } else {
      labelEl.textContent = '';
      labelEl.className = 'award-label';
    }
  }

  let currentMenu = null;
  function closeAwardMenu(){
    if(currentMenu){
      currentMenu.remove();
      currentMenu = null;
      document.removeEventListener('mousedown', handleOutsideClick, true);
      document.removeEventListener('keydown', handleEscape, true);
    }
  }
  function handleOutsideClick(e){
    if(currentMenu && !currentMenu.contains(e.target)) closeAwardMenu();
  }
  function handleEscape(e){
    if(e.key === 'Escape') closeAwardMenu();
  }

  function openAwardMenu(e, index){
    e.stopPropagation();
    closeAwardMenu();

    const menu = document.createElement('div');
    menu.className = 'award-menu';
    menu.innerHTML = `
      <div class="menu-label">${index+1}번 작품 · 우수작 선정</div>
      <button class="tier-grand" data-tier="grand"><span class="dot"></span>대상으로 선정</button>
      <button class="tier-excellent" data-tier="excellent"><span class="dot"></span>최우수상으로 선정</button>
      <button class="tier-merit" data-tier="merit"><span class="dot"></span>우수상으로 선정</button>
      <hr>
      <button class="clear" data-tier=""><span class="dot"></span>선정 해제</button>
    `;
    document.body.appendChild(menu);

    // 화면 밖으로 나가지 않도록 위치 보정
    const menuWidth = menu.offsetWidth;
    const menuHeight = menu.offsetHeight;
    let left = e.clientX;
    let top = e.clientY;
    if(left + menuWidth > window.innerWidth - 12) left = window.innerWidth - menuWidth - 12;
    if(top + menuHeight > window.innerHeight - 12) top = window.innerHeight - menuHeight - 12;
    menu.style.left = left + 'px';
    menu.style.top = top + 'px';

    menu.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const tier = btn.dataset.tier;
        if(tier){
          awards[index] = tier;
        } else {
          delete awards[index];
        }
        renderArtworkAward(index);
        updateAwardSummary();
        closeAwardMenu();
      });
    });

    currentMenu = menu;
    setTimeout(()=>{
      document.addEventListener('mousedown', handleOutsideClick, true);
      document.addEventListener('keydown', handleEscape, true);
    }, 0);
  }

  newGalleryBtn.addEventListener('click', ()=>{
    files = [];
    awards = {};
    renderFileList();
    grid.innerHTML = '';
    galleryScreen.style.display = 'none';
    uploadScreen.style.display = 'flex';
  });
</script>
</body>
</html>
