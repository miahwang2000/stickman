<style>
html, body { margin:0; height:100%; }
body {
  font-family:sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
}

/* 전체 앱을 폭 600 x 높이 1024 기준으로 최적화 (그 이하 화면에서는 자동 축소) */
#appWrap {
  width:100%;
  max-width:600px;
  max-height:1024px;
  margin:0 auto;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
}

.topbar, .bottombar {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:10px;
  background:#ddd;
  align-items:center;
}

#canvasWrap {
  position:relative;
  width:100%;
  max-width:500px;
  aspect-ratio: 1 / 1;
  margin:12px auto;
  background:white;
  border:1px solid #ccc;
  touch-action:none; /* 손가락으로 그릴 때 화면 스크롤/줌 되는 것 방지 */
}

/* 가이드 캔버스(아래) / 드로잉 캔버스(위, 투명) */

  position:absolute;

  left:0;

  height:100%;
}

#c { background:transparent; }

button {

  font-size:18px;
  min-width:44px;
  min-height:44px;
  border-radius:8px;
  border:1px solid #bbb;

   - 좌우 padding을 줄여 버튼 자체 폭은 줄이되, 터치 영역(44x44)은 그대로 유지.

     font-size를 키우고, 이모지 전용 컬러 폰트를 우선 사용하도록 font-family를 지정.
   - line-height:1 + display:flex로 세로 중앙 정렬해서 이모지가 버튼 중앙에 오도록 함. */

<script>
/* =========================
   스테이지별 가이드 이미지 (파일 경로)
   - stage1Guides: 걷기(walk) 동작 7장
   - stage2Guides: 달리기(running) 동작 7장
   - 3~5 스테이지 이미지는 아직 없어서 빈 배열([])로 둠.
     빈 배열이면 그냥 가이드가 안 보일 뿐, 에러는 나지 않음.

   ※ 이미지는 GitHub Pages로 배포된 주소를 사용합니다.
     (https://miahwang2000.github.io/stickman/images/ 폴더 아래에 실제 파일이 있음)
========================= */
const stage1Guides = [
  "https://miahwang2000.github.io/stickman/images/walk1.png",
  "https://miahwang2000.github.io/stickman/images/walk2.png",
  "https://miahwang2000.github.io/stickman/images/walk3.png",
  "https://miahwang2000.github.io/stickman/images/walk4.png",
  "https://miahwang2000.github.io/stickman/images/walk5.png",
  "https://miahwang2000.github.io/stickman/images/walk6.png",
  "https://miahwang2000.github.io/stickman/images/walk7.png"
];

const stage2Guides = [
  "https://miahwang2000.github.io/stickman/images/running1.png",
  "https://miahwang2000.github.io/stickman/images/running2.png",
  "https://miahwang2000.github.io/stickman/images/running3.png",
  "https://miahwang2000.github.io/stickman/images/running4.png",
  "https://miahwang2000.github.io/stickman/images/running5.png",
  "https://miahwang2000.github.io/stickman/images/running6.png",
  "https://miahwang2000.github.io/stickman/images/running7.png"
];

const stage3Guides = [
  "https://miahwang2000.github.io/stickman/images/jumping1.png",
  "https://miahwang2000.github.io/stickman/images/jumping2.png",
  "https://miahwang2000.github.io/stickman/images/jumping3.png",
  "https://miahwang2000.github.io/stickman/images/jumping4.png",
  "https://miahwang2000.github.io/stickman/images/jumping5.png",
  "https://miahwang2000.github.io/stickman/images/jumping6.png",
  "https://miahwang2000.github.io/stickman/images/jumping7.png"
];

const stage4Guides = [
  "https://miahwang2000.github.io/stickman/images/soccer1.png",
  "https://miahwang2000.github.io/stickman/images/soccer2.png",
  "https://miahwang2000.github.io/stickman/images/soccer3.png",
  "https://miahwang2000.github.io/stickman/images/soccer4.png",
  "https://miahwang2000.github.io/stickman/images/soccer5.png",
  "https://miahwang2000.github.io/stickman/images/soccer6.png",
  "https://miahwang2000.github.io/stickman/images/soccer7.png"
];

const stage5Guides = [
  "https://miahwang2000.github.io/stickman/images/taekwon1.png",
  "https://miahwang2000.github.io/stickman/images/taekwon2.png",
  "https://miahwang2000.github.io/stickman/images/taekwon3.png",
  "https://miahwang2000.github.io/stickman/images/taekwon4.png",
  "https://miahwang2000.github.io/stickman/images/taekwon5.png",
  "https://miahwang2000.github.io/stickman/images/taekwon6.png",
  "https://miahwang2000.github.io/stickman/images/taekwon7.png"
];

const guideSets = [
  stage1Guides, // 스테이지 1 - 걷기(walk)
  stage2Guides, // 스테이지 2 - 달리기(running)
  stage3Guides, // 스테이지 3 - 점프(jumping)
  stage4Guides, // 스테이지 4 - 축구(soccer)
  stage5Guides, // 스테이지 5 - 태권도(taekwondo)
  [],           // 스테이지 6 (가이드 이미지 없음)
  []            // 스테이지 7 (가이드 이미지 없음)
];

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const guideCanvas = document.getElementById("guide");
const guideCtx = guideCanvas.getContext("2d");

let tool = "pen";
let drawing = false;
let strokePoints = []; // 손떨림 보정을 위해 현재 스트로크의 좌표들을 저장

/* =========================
   자동 저장 (localStorage)
   - 스테이지별로 7개 프레임(dataURL)을 모두 저장해서,
     스테이지를 이동하거나 브라우저를 껐다 켜도 그림이 유지되도록 함.
   ※ 참고: Claude.ai 내부 미리보기(아티팩트) 화면에서는 localStorage가
     동작하지 않을 수 있습니다. 이 파일을 다운로드해서 직접 열거나
     GitHub Pages 등 실제 웹 서버에 올려서 사용하면 정상적으로
     자동저장/불러오기가 동작합니다.
========================= */
const STORAGE_KEY = "stickmanClassFinal_autoSave_v1";

let allStageFrames = {};
for(let s=1; s<=7; s++){
  allStageFrames[s] = new Array(7).fill(null);
}

let currentFrame = 0;
let stage = 1;
let frames = allStageFrames[stage];

let interval = null;
let playIndex = 0;

function saveToLocalStorage(){
  try{
    const data = {
      stage: stage,
      currentFrame: currentFrame,
      framesByStage: allStageFrames
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e){
    console.warn("자동저장에 실패했습니다:", e);
  }
}

function loadFromLocalStorage(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  } catch(e){
    console.warn("저장된 데이터를 불러오는 중 오류가 발생했습니다:", e);
    return null;
  }
}

function clearLocalStorage(){
  try{
    localStorage.removeItem(STORAGE_KEY);
  } catch(e){
    console.warn("저장된 데이터를 삭제하지 못했습니다:", e);
  }
}

/* =========================
   TOOL (브러시/지우개 활성 표시)
========================= */
function selectTool(t){
  tool = t;

  const brushBtn = document.getElementById("brushBtn");
  const eraserBtn = document.getElementById("eraserBtn");

  brushBtn.classList.toggle("toolActive", tool === "pen");
  eraserBtn.classList.toggle("toolActive", tool === "eraser");
}
selectTool("pen"); // 초기값: 브러시 선택 상태로 시작

/* =========================
   UI
========================= */
function renderUI(){
  const ui = document.getElementById("frameUI");
  ui.innerHTML = "";

  for(let i=0;i<7;i++){
    let d = document.createElement("div");
    d.className = "frameBox";
    d.innerText = i+1;

    if(i === currentFrame) d.classList.add("active");

    d.onclick = () => {
      if(interval) return; // 재생 중에는 프레임 이동 막기
      saveFrame();
      currentFrame = i;
      loadFrame(i);
      saveToLocalStorage();
    };

    ui.appendChild(d);
  }
}
renderUI();

/* =========================
   DRAW
   (캔버스가 CSS로 화면 크기에 맞게 늘어나거나 줄어들 수 있으므로,
    실제 내부 해상도(500x500)에 맞게 좌표를 보정해준다 - 모바일 대응)
========================= */
function getCanvasPos(clientX, clientY){
  const r = canvas.getBoundingClientRect();
  const scaleX = canvas.width / r.width;
  const scaleY = canvas.height / r.height;
  return {
    x: (clientX - r.left) * scaleX,
    y: (clientY - r.top) * scaleY
  };
}

/* 캔버스 안쪽의 점(p0)에서 캔버스 밖의 점(p1)으로 향하는 선분이
   캔버스 경계(0~w, 0~h)와 만나는 정확한 지점을 계산한다.
   방향에 관계없이(위/아래/좌/우/대각선) 항상 실제 경계선까지 정확히 닿도록 하기 위함. */
function getBoundaryPoint(p0, p1, w, h){
  const dx = p1.x - p0.x;
  const dy = p1.y - p0.y;
  let tx = Infinity, ty = Infinity;

  if(dx > 0) tx = (w - p0.x) / dx;
  else if(dx < 0) tx = (0 - p0.x) / dx;

  if(dy > 0) ty = (h - p0.y) / dy;
  else if(dy < 0) ty = (0 - p0.y) / dy;

  let t = Math.min(tx, ty);
  if(!isFinite(t)) t = 1;
  t = Math.max(0, Math.min(1, t));

  return { x: p0.x + dx * t, y: p0.y + dy * t };
}

/* 브러시/지우개 스타일 적용 (여러 곳에서 재사용) */
function applyToolStyle(){
  if(tool === "eraser"){
    ctx.globalCompositeOperation = "destination-out";
    ctx.lineWidth = 20;
  } else {
    ctx.globalCompositeOperation = "source-over";
    ctx.lineWidth = 6;
    ctx.strokeStyle = "black";
  }
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
}

function startDraw(clientX, clientY){
  if(interval) return;
  drawing = true;
  const p = getCanvasPos(clientX, clientY);
  strokePoints = [p];
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
}

function moveDraw(clientX, clientY){
  if(!drawing) return;
  const raw = getCanvasPos(clientX, clientY);
  const outOfBounds = raw.x < 0 || raw.y < 0 || raw.x > canvas.width || raw.y > canvas.height;

  applyToolStyle();

  // 브러시가 캔버스 영역 밖으로 나가면, 실제 경계선까지 정확히 그은 뒤 선을 끊는다.
  // (터치는 손가락이 캔버스 밖으로 나가도 touchmove가 계속 발생해서 좌표가
  //  범위를 크게 벗어날 수 있으므로, 마지막 유효 좌표 -> 현재 좌표 선분이
  //  경계와 만나는 지점을 직접 계산해서 그 지점까지는 반드시 그려준다)
  if(outOfBounds){
    const last = strokePoints[strokePoints.length - 1] || raw;
    const edge = getBoundaryPoint(last, raw, canvas.width, canvas.height);
    ctx.lineTo(edge.x, edge.y);
    ctx.stroke();
    finishStroke();
    return;
  }

  strokePoints.push(raw);

  // 손떨림 보정: 연속된 점들의 중간점을 지나는 완만한 곡선(quadratic curve)으로 이어그려서
  // 손이 미세하게 떨려도 각지지 않고 부드러운 선이 나오도록 함
  const n = strokePoints.length;
  if(n < 3){
    ctx.lineTo(raw.x, raw.y);
  } else {
    const prev = strokePoints[n - 2];
    const mid = { x:(prev.x + raw.x) / 2, y:(prev.y + raw.y) / 2 };
    ctx.quadraticCurveTo(prev.x, prev.y, mid.x, mid.y);
  }
  ctx.stroke();
}

/* 스트로크 종료 공통 처리 (그리기 상태 해제 + 저장 + 합성모드 복구) */
function finishStroke(){
  drawing = false;
  saveFrame();
  ctx.globalCompositeOperation = "source-over"; // 지우개로 그린 뒤에도 합성 모드를 항상 원상복구
}

function endDraw(){
  if(!drawing) return; // 이미 끊긴 상태면 중복 처리하지 않음

  // 보정 곡선이 마지막 실제 좌표보다 살짝 앞에서 끝나므로,
  // 스트로크를 마무리할 때 마지막 지점까지 정확히 이어준다
  const last = strokePoints[strokePoints.length - 1];
  if(last){
    ctx.lineTo(last.x, last.y);
    ctx.stroke();
  }

  finishStroke();
}

// 마우스 (PC)
canvas.addEventListener("mousedown", (e)=> startDraw(e.clientX, e.clientY));
canvas.addEventListener("mouseup", endDraw);
canvas.addEventListener("mousemove", (e)=> moveDraw(e.clientX, e.clientY));
// 마우스가 캔버스 영역을 완전히 벗어나는 순간에도, moveDraw와 동일한 경계 계산 로직으로
// 실제 경계선까지 정확히 그은 뒤 즉시 선을 끊는다
canvas.addEventListener("mouseleave", (e) => moveDraw(e.clientX, e.clientY));

// 터치 (모바일) - preventDefault로 화면 스크롤/줌 방지
canvas.addEventListener("touchstart", (e)=>{
  e.preventDefault();
  const t = e.touches[0];
  startDraw(t.clientX, t.clientY);
}, { passive:false });

canvas.addEventListener("touchmove", (e)=>{
  e.preventDefault();
  const t = e.touches[0];
  moveDraw(t.clientX, t.clientY);
}, { passive:false });

canvas.addEventListener("touchend", (e)=>{
  e.preventDefault();
  endDraw();
}, { passive:false });

/* =========================
   FRAME
   (frames 배열에는 드로잉 캔버스만 저장. 가이드는 별도 캔버스라서
    사용자가 그린 그림에 가이드가 섞여 저장되지 않음)
========================= */
function saveFrame(){
  frames[currentFrame] = canvas.toDataURL();
  saveToLocalStorage();
}

function loadFrame(i){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.globalCompositeOperation = "source-over"; // 지우개 상태로 프레임을 이동해도 이미지가 정상적으로 보이도록 강제 복구

  if(frames[i]){
    let img = new Image();
    img.src = frames[i];
    img.onload = ()=>{
      ctx.globalCompositeOperation = "source-over";
      ctx.drawImage(img,0,0);
    };
  }

  // 재생 중이 아닐 때만 가이드를 보여줌
  if(!interval){
    showGuide(i);
  }

  renderUI();
}

/* =========================
   GUIDE (이미지 기반, 30% 투명도)
   ※ 외부 이미지를 canvas에 그리므로 crossOrigin 속성을 지정해 CORS 문제를 방지합니다.
   ※ 스테이지 전환 시 alert() 창이 떠 있는 동안에도 이전 프레임의 이미지 로딩이
     백그라운드에서 계속 진행되다가, 얼럿을 닫은 후 새 프레임 이미지 로딩과
     겹쳐서 그려지는 문제(가이드 이미지가 2개로 겹쳐 보이는 현상)가 있었습니다.
     이를 막기 위해 요청마다 고유 ID를 부여하고, 로딩이 끝났을 때 그 ID가
     "가장 최근 요청"이 맞는지 확인한 뒤에만 그리도록 했습니다(오래된 요청은 무시).
========================= */
let guideRequestId = 0;

function showGuide(frameIndex){
  guideRequestId++;
  const myRequestId = guideRequestId;

  guideCtx.clearRect(0,0,guideCanvas.width,guideCanvas.height);

  const set = guideSets[stage-1] || [];
  const src = set[frameIndex];

  if(!src) return; // 해당 스테이지/프레임에 가이드 이미지가 없으면 그냥 안 보이게 처리 (에러 없음)

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = () => {
    // 이 로딩이 시작된 이후에 더 최신 요청(다른 프레임/스테이지 전환 등)이 있었다면 무시
    if(myRequestId !== guideRequestId) return;
    // 재생이 시작된 사이에 이미지가 늦게 로드되는 경우를 대비해 다시 한 번 체크
    if(interval) return;

    guideCtx.clearRect(0,0,guideCanvas.width,guideCanvas.height);
    guideCtx.save();
    guideCtx.globalAlpha = 0.3;
    guideCtx.drawImage(img, 0, 0, guideCanvas.width, guideCanvas.height);
    guideCtx.restore();
  };
  img.onerror = () => {
    console.warn("가이드 이미지를 불러오지 못했습니다. stage:", stage, "frame:", frameIndex, "src:", src);
  };
  img.src = src;
}

function hideGuide(){
  guideCtx.clearRect(0,0,guideCanvas.width,guideCanvas.height);
}

/* =========================
   PLAY (가이드 완전히 숨김)
========================= */
function togglePlay(){
  if(interval){
    stop();
  } else {
    play();
  }
}

function play(){
  if(interval) return;

  hideGuide(); // 플레이 시작하는 순간 가이드는 100% 사라짐
  const playBtn = document.getElementById("playBtn");
  playBtn.classList.add("playActive");
  playBtn.innerText = "⏹️";
  playBtn.title = "STOP";

  playIndex = 0;

  interval = setInterval(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.globalCompositeOperation = "source-over"; // 지우개 상태로 재생을 눌러도 프레임이 정상적으로 보이도록 강제 복구

    currentFrame = playIndex; // 재생 중에도 현재 프레임 번호를 실시간으로 맞춰줌
    renderUI();

    if(frames[playIndex]){
      let img = new Image();
      img.src = frames[playIndex];
      img.onload = ()=>{
        ctx.globalCompositeOperation = "source-over";
        ctx.drawImage(img,0,0);
      };
    }

    playIndex++;
    if(playIndex > 6) playIndex = 0;

  },180);
}

function stop(){
  clearInterval(interval);
  interval = null;

  const playBtn = document.getElementById("playBtn");
  playBtn.classList.remove("playActive");
  playBtn.innerText = "▶️";
  playBtn.title = "PLAY";

  // 정지하면 현재 프레임의 가이드를 다시 30%로 보여줌
  showGuide(currentFrame);
  saveToLocalStorage();
}

/* =========================
   GIF 다운로드
   - 인코딩은 gif.js 라이브러리가 Web Worker(백그라운드 스레드)에서 처리하므로
     GIF를 만드는 동안에도 화면(메인 스레드)이 멈추지 않음.
   - 워커 스크립트는 fetch로 받아 Blob URL로 변환해서 넘겨준다.
     (크로스 오리진 CDN 주소를 워커에 직접 넘기면 브라우저에 따라
      막히는 경우가 있어, 이렇게 하면 항상 안전하게 동작함)
========================= */
let _gifWorkerBlobUrl = null; // 한 번만 받아서 재사용 (매번 다시 받지 않도록)

async function getGifWorkerUrl(){
  if(_gifWorkerBlobUrl) return _gifWorkerBlobUrl;
  const res = await fetch("https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js");
  const blob = await res.blob();
  _gifWorkerBlobUrl = URL.createObjectURL(blob);
  return _gifWorkerBlobUrl;
}

// GIF로 저장할 때의 출력 크기. 원본 캔버스(500x500)보다 작게(200x200) 저장해서
// 파일 용량을 줄이고 다운로드/공유를 가볍게 만든다.
const GIF_OUTPUT_WIDTH = 200;
const GIF_OUTPUT_HEIGHT = 200;

function frameToCanvas(dataUrl){
  // 프레임(투명 배경) 위에 흰 배경을 깔고, GIF_OUTPUT_WIDTH x GIF_OUTPUT_HEIGHT 크기로 축소해서
  // GIF용 캔버스로 변환
  return new Promise((resolve, reject) => {
    const tmp = document.createElement("canvas");
    tmp.width = GIF_OUTPUT_WIDTH;
    tmp.height = GIF_OUTPUT_HEIGHT;
    const tctx = tmp.getContext("2d");

    tctx.fillStyle = "white";
    tctx.fillRect(0, 0, tmp.width, tmp.height);

    if(!dataUrl){
      resolve(tmp); // 빈 프레임이면 흰 배경만
      return;
    }

    const img = new Image();
    img.onload = () => {
      // 원본(500x500) 이미지를 축소된 캔버스 크기에 맞춰 그림
      tctx.drawImage(img, 0, 0, tmp.width, tmp.height);
      resolve(tmp);
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

// 파일명이 매번 같으면 모바일에서 "저장"할 때 기존 파일을 덮어쓰게 됨.
// 다운로드마다 고유한 타임스탬프를 붙여서 항상 새 파일(사본)로 저장되도록 함.
// 예: 20260713_153245123 (년월일_시분초밀리초)
function getTimestampForFilename(){
  const d = new Date();
  const pad = (n, len=2) => String(n).padStart(len, "0");
  return "" + d.getFullYear() +
    pad(d.getMonth()+1) +
    pad(d.getDate()) + "_" +
    pad(d.getHours()) +
    pad(d.getMinutes()) +
    pad(d.getSeconds());
}

async function downloadGif(){
  if(interval) return; // 재생 중에는 실행 안 함

  const btn = document.getElementById("gifBtn");
  btn.disabled = true;
  const originalText = btn.innerText;
  btn.innerText = "⏳";
  btn.title = "GIF 생성 중...";

  try{
    saveFrame(); // 현재 그리고 있던 프레임도 저장

    const workerUrl = await getGifWorkerUrl();

    const gif = new GIF({
      workers: 2,
      quality: 10,
      width: GIF_OUTPUT_WIDTH,
      height: GIF_OUTPUT_HEIGHT,
      workerScript: workerUrl
    });

    for(let i = 0; i < 7; i++){
      const frameCanvas = await frameToCanvas(frames[i]);
      gif.addFrame(frameCanvas, { delay: 180 });
    }

    gif.on("finished", (blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "stickman_stage" + stage + "_" + getTimestampForFilename() + ".gif";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      btn.disabled = false;
      btn.innerText = originalText;
      btn.title = "GIF 다운로드";
    });

    gif.render();

  } catch(err){
    console.error("GIF 생성 중 오류:", err);
    alert("GIF를 만드는 중 문제가 발생했습니다: " + (err && err.message ? err.message : err));
    btn.disabled = false;
    btn.innerText = originalText;
    btn.title = "GIF 다운로드";
  }
}

/* =========================
   TOAST
   (alert()은 화면을 막는 모달이라 모바일에서 불편하고,
    떠 있는 동안 이전 요청의 이미지 로딩과 겹치는 문제의 원인이 될 수 있어
    화면을 막지 않는 토스트 알림으로 교체함)
========================= */
let toastTimer = null;
function showToast(msg){
  const el = document.getElementById("toast");
  el.innerText = msg;
  el.classList.add("show");

  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{
    el.classList.remove("show");
  }, 1000);
}

/* =========================
   STAGE
========================= */
function goToStage(newStage){
  stage = newStage;

  stop(); // 혹시 재생 중이면 정지

  document.getElementById("stageText").innerText = "스테이지 " + stage;

  // 1번 스테이지에서는 이전 스테이지 아이콘을 숨김
  document.getElementById("stageBackBtn").classList.toggle("hidden", stage <= 1);

  showToast("스테이지 " + stage + " 시작!");

  frames = allStageFrames[stage]; // 저장되어 있던 스테이지별 프레임을 불러옴 (없으면 빈 배열)
  currentFrame = 0;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  loadFrame(0); // 새 스테이지의 0번 프레임 + 가이드 표시

  saveToLocalStorage();
}

function nextStage() {
  let n = stage + 1;
  if(n > 7) n = 1; // 7스테이지까지만 존재
  goToStage(n);
}

function prevStage() {
  if(stage <= 1) return; // 1번 스테이지에서는 더 이전으로 가지 않음
  goToStage(stage - 1);
}

/* =========================
   다시 그리기 (현재 프레임의 사용자 그림만 초기화, 가이드는 유지)
========================= */
function resetCurrentFrame(){
  if(interval) return; // 재생 중에는 동작 안 함

  frames[currentFrame] = null;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  showGuide(currentFrame); // 가이드는 다시 보여줌
  saveToLocalStorage();
}

/* =========================
   초기화: 저장된 데이터가 있으면 복원
========================= */
(function initFromStorage(){
  const saved = loadFromLocalStorage();

  if(saved && saved.framesByStage){
    for(let s=1; s<=7; s++){
      if(saved.framesByStage[s]){
        allStageFrames[s] = saved.framesByStage[s];
      }
    }
    stage = saved.stage || 1;
    currentFrame = saved.currentFrame || 0;
  }

  frames = allStageFrames[stage];

  document.getElementById("stageText").innerText = "스테이지 " + stage;
  document.getElementById("stageBackBtn").classList.toggle("hidden", stage <= 1);

  loadFrame(currentFrame);

  if(saved){
    showToast("이전에 저장된 그림을 불러왔습니다");
  }
})();

</script>
